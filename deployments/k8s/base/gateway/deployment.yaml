apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: scout
  labels:
    app: gateway
    component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
      component: server
  template:
    metadata:
      labels:
        app: gateway
        component: server
    spec:
      containers:
        - name: gateway
          image: scout/gateway:latest
          imagePullPolicy: Never  # Use local images with kind
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: gateway-config
          env:
            - name: POSTGRES_PASSWORD
              value: "scout_dev_password"  # TODO: Use Secret instead
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5