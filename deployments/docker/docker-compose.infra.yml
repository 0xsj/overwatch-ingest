name: scout
services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: scout-postgres
    environment:
      POSTGRES_USER: scout
      POSTGRES_PASSWORD: scout_dev_password
      POSTGRES_DB: scout
    ports:
      - "5434:5432"  # Changed from 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scout"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: scout-redis
    ports:
      - "6381:6379"  # Changed from 6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NATS
  nats:
    image: nats:2.10-alpine
    container_name: scout-nats
    ports:
      - "4224:4222"  # Client connections - Changed from 4222
      - "8224:8222"  # HTTP monitoring - Changed from 8222
      - "6224:6222"  # Cluster connections - Changed from 6222
    command: "--http_port 8222"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: scout-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: scout
      RABBITMQ_DEFAULT_PASS: scout_dev_password
    ports:
      - "5673:5672"   # AMQP - Changed from 5672
      - "15673:15672" # Management UI - Changed from 15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Jaeger (Distributed Tracing)
  jaeger:
    image: jaegertracing/all-in-one:1.52
    container_name: scout-jaeger
    ports:
      - "5776:5775/udp"   # Zipkin compact thrift - Changed
      - "6833:6831/udp"   # Jaeger compact thrift - Changed
      - "6834:6832/udp"   # Jaeger binary thrift - Changed
      - "5779:5778"       # Serve configs - Changed
      - "16687:16686"     # Jaeger UI - Changed from 16686
      - "14269:14268"     # Jaeger collector HTTP - Changed
      - "14251:14250"     # Jaeger gRPC - Changed
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:14269/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: scout-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9091:9090"  # Changed from 9090
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Grafana
  grafana:
    image: grafana/grafana:10.2.3
    container_name: scout-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"  # Changed from 3000
    volumes:
      - ./config/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: scout-network
