version: '3.8'

services:
  # Gateway Server
  gateway:
    build:
      context: ../../
      dockerfile: deployments/docker/Dockerfile.gateway
    container_name: scout-gateway
    ports:
      - "8080:8080"
    volumes:
      - ../../:/app
    environment:
      - ENV=development
      - LOG_LEVEL=debug
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=scout
      - POSTGRES_PASSWORD=scout_dev_password
      - POSTGRES_DB=scout
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NATS_URL=nats://nats:4222
      - RABBITMQ_URL=amqp://scout:scout_dev_password@rabbitmq:5672/
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    depends_on:
      - postgres
      - redis
      - nats
      - rabbitmq
      - otel-collector
    networks:
      - scout-network
    restart: unless-stopped

  # Gateway Worker
  gateway-worker:
    build:
      context: ../../
      dockerfile: deployments/docker/Dockerfile.gateway
    container_name: scout-gateway-worker
    command: ["air", "-c", "gateway/.air.worker.toml"]
    volumes:
      - ../../:/app
    environment:
      - ENV=development
      - LOG_LEVEL=debug
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - NATS_URL=nats://nats:4222
      - RABBITMQ_URL=amqp://scout:scout_dev_password@rabbitmq:5672/
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      - postgres
      - redis
      - nats
      - rabbitmq
      - otel-collector
    networks:
      - scout-network
    restart: unless-stopped

  # Agents Server
  agents:
    build:
      context: ../../
      dockerfile: deployments/docker/Dockerfile.agents
    container_name: scout-agents
    ports:
      - "8081:8081"
    volumes:
      - ../../:/app
    environment:
      - ENV=development
      - LOG_LEVEL=debug
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - NATS_URL=nats://nats:4222
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      - postgres
      - redis
      - nats
      - otel-collector
    networks:
      - scout-network
    restart: unless-stopped

  # Agents Worker
  agents-worker:
    build:
      context: ../../
      dockerfile: deployments/docker/Dockerfile.agents
    container_name: scout-agents-worker
    command: ["air", "-c", "services/agents/.air.worker.toml"]
    volumes:
      - ../../:/app
    environment:
      - ENV=development
      - LOG_LEVEL=debug
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - NATS_URL=nats://nats:4222
      - RABBITMQ_URL=amqp://scout:scout_dev_password@rabbitmq:5672/
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      - postgres
      - redis
      - nats
      - rabbitmq
      - otel-collector
    networks:
      - scout-network
    restart: unless-stopped

  # Incidents Server
  incidents:
    build:
      context: ../../
      dockerfile: deployments/docker/Dockerfile.incidents
    container_name: scout-incidents
    ports:
      - "8082:8082"
    volumes:
      - ../../:/app
    environment:
      - ENV=development
      - LOG_LEVEL=debug
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - NATS_URL=nats://nats:4222
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      - postgres
      - redis
      - nats
      - otel-collector
    networks:
      - scout-network
    restart: unless-stopped

  # Incidents Worker
  incidents-worker:
    build:
      context: ../../
      dockerfile: deployments/docker/Dockerfile.incidents
    container_name: scout-incidents-worker
    command: ["air", "-c", "services/incidents/.air.worker.toml"]
    volumes:
      - ../../:/app
    environment:
      - ENV=development
      - LOG_LEVEL=debug
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - NATS_URL=nats://nats:4222
      - RABBITMQ_URL=amqp://scout:scout_dev_password@rabbitmq:5672/
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      - postgres
      - redis
      - nats
      - rabbitmq
      - otel-collector
    networks:
      - scout-network
    restart: unless-stopped

  # Tools Service (Python ML)
  tools:
    build:
      context: ../../
      dockerfile: deployments/docker/Dockerfile.tools
    container_name: scout-tools
    ports:
      - "8083:8083"
    volumes:
      - ../../platform/pylib/scout_common:/app/platform/pylib/scout_common
      - ../../services/tools/app:/app/services/tools/app
    environment:
      - ENV=development
      - LOG_LEVEL=debug
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - NATS_URL=nats://nats:4222
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      - postgres
      - redis
      - nats
      - otel-collector
    networks:
      - scout-network
    restart: unless-stopped

  # Analytics Service (Python ML)
  analytics:
    build:
      context: ../../
      dockerfile: deployments/docker/Dockerfile.analytics
    container_name: scout-analytics
    ports:
      - "8084:8084"
    volumes:
      - ../../platform/pylib/scout_common:/app/platform/pylib/scout_common
      - ../../services/analytics/app:/app/services/analytics/app
    environment:
      - ENV=development
      - LOG_LEVEL=debug
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - NATS_URL=nats://nats:4222
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      - postgres
      - redis
      - nats
      - otel-collector
    networks:
      - scout-network
    restart: unless-stopped

networks:
  scout-network:
    external: true