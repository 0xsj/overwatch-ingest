syntax = "proto3";

package tools.v1;

option go_package = "github.com/0xsj/scout/api/proto/tools/v1;toolsv1";

// ToolsService provides ML tools operations
service ToolsService {
  // Health checks if the service is healthy
  rpc Health(HealthRequest) returns (HealthResponse);
  
  // ProcessData processes input data using ML tools
  rpc ProcessData(ProcessDataRequest) returns (ProcessDataResponse);
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
  string service = 2;
  string version = 3;
}

message ProcessDataRequest {
  string data = 1;
  string tool_type = 2;  // "classification", "sentiment", "extraction"
}

message ProcessDataResponse {
  string result = 1;
  float confidence = 2;
  int64 processing_time_ms = 3;
}