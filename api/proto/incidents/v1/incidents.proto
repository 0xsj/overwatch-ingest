syntax = "proto3";

package incidents.v1;

option go_package = "github.com/0xsj/scout/api/proto/incidents/v1;incidentsv1";

// IncidentsService provides incident management operations
service IncidentsService {
  // Health checks if the service is healthy
  rpc Health(HealthRequest) returns (HealthResponse);
  
  // GetIncidentSummary returns a summary of current incidents
  rpc GetIncidentSummary(GetIncidentSummaryRequest) returns (GetIncidentSummaryResponse);
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
  string service = 2;
  string version = 3;
}

message GetIncidentSummaryRequest {}

message GetIncidentSummaryResponse {
  int32 total_incidents = 1;
  int32 critical_count = 2;
  int32 active_count = 3;
  int32 resolved_count = 4;
}